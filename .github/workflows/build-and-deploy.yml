name: Build & Publish custom opkg repo

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "release channel"
        required: true
        type: choice
        options:
          - stable
          - beta
        default: stable

  schedule:
    - cron: '0 15 * * *'

permissions:
  contents: write

env:
  CHANNEL: ${{ github.event_name == 'schedule' && 'beta' || (inputs.channel || 'stable') }}
  PUBLISH_ROOT: public
  FEED_NAME: smartsafehub

  OPENWRT_REPO: Beomjun/openwrt
  OPENWRT_REF: production

  OPKG_UTILS_REF: 68a969f0e867ace0d94faf8ebe7c7bb67f59d386
  USIGN_REF: c4c72b1b07945ee192361dc751291a7c98d6adcd

  SRC_SAFESHIELD_REPO: Beomjun/safeshield
  SRC_SAFESHIELD_REF: main
  SRC_LUCI_REPO: Beomjun/luci-app-safeshield
  SRC_LUCI_REF: main

  CUSTOM_PACKAGES: safeshield luci-app-safeshield

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pages repo (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Select source refs by channel
        run: |
          set -eux

          if [ "${CHANNEL}" = "beta" ]; then
            echo "SRC_SAFESHIELD_REF=develop" >> "$GITHUB_ENV"
            echo "SRC_LUCI_REF=develop" >> "$GITHUB_ENV"
          else
            echo "SRC_SAFESHIELD_REF=main" >> "$GITHUB_ENV"
            echo "SRC_LUCI_REF=main" >> "$GITHUB_ENV"
          fi

      - name: Checkout OpenWrt (production branch)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENWRT_REPO }}
          ref: ${{ env.OPENWRT_REF }}
          path: openwrt
          fetch-depth: 1
          submodules: false

      - name: Checkout SafeShield source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SRC_SAFESHIELD_REPO }}
          ref: ${{ env.SRC_SAFESHIELD_REF }}
          path: src/safeshield
          fetch-depth: 1
          submodules: false

      - name: Checkout LuCI app source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SRC_LUCI_REPO }}
          ref: ${{ env.SRC_LUCI_REF }}
          path: src/luci-app-safeshield
          fetch-depth: 1
          submodules: false

      - name: Cache OpenWrt downloads (dl)
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ runner.os }}-${{ env.OPENWRT_REF }}
          restore-keys: |
            openwrt-dl-${{ runner.os }}-

      - name: Cache usign source and build
        id: cache-usign
        uses: actions/cache@v4
        with:
          path: usign-src
          key: usign-${{ runner.os }}-${{ env.USIGN_REF }}

      - name: Cache opkg-utils source
        id: cache-opkg-utils
        uses: actions/cache@v4
        with:
          path: opkg-utils
          key: opkg-utils-${{ runner.os }}-${{ env.OPKG_UTILS_REF }}

      - name: Install build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gawk git gettext libncurses5-dev libssl-dev \
            python3 rsync unzip file wget curl ca-certificates zlib1g-dev \
            perl cmake

      - name: Fetch opkg-utils source (cache miss only)
        if: steps.cache-opkg-utils.outputs.cache-hit != 'true'
        run: |
          set -eux
          rm -rf opkg-utils
          git clone https://git.yoctoproject.org/opkg-utils opkg-utils
          git -C opkg-utils checkout "${OPKG_UTILS_REF}"

      - name: Verify opkg-utils
        run: |
          set -eux
          test -f opkg-utils/opkg-make-index
          test -x opkg-utils/opkg-make-index || chmod +x opkg-utils/opkg-make-index

      - name: Fetch usign source (cache miss only)
        if: steps.cache-usign.outputs.cache-hit != 'true'
        run: |
          set -eux
          rm -rf usign-src
          git clone https://github.com/openwrt/usign.git usign-src
          git -C usign-src checkout "${USIGN_REF}"

      - name: Build usign (cache miss only)
        if: steps.cache-usign.outputs.cache-hit != 'true'
        run: |
          set -eux
          test -d usign-src
          mkdir -p usign-src/build
          cmake -S usign-src -B usign-src/build
          cmake --build usign-src/build -j"$(nproc)"
          test -x usign-src/build/usign

      - name: Verify usign binary
        run: |
          set -eux
          test -x usign-src/build/usign
          usign-src/build/usign -h >/dev/null 2>&1 || true

      - name: Prepare OpenWrt feeds and packages
        run: |
          set -eux
          cd openwrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          for pkg in ${CUSTOM_PACKAGES}; do
            rm -rf "package/${pkg}"
            rsync -a --delete "${GITHUB_WORKSPACE}/src/${pkg}/" "package/${pkg}/"
            test -f "package/${pkg}/Makefile"
          done

      - name: Pack prepared workspace
        run: |
          set -eux
          tar -cpf prepared-openwrt-workspace.tar openwrt opkg-utils usign-src

      - name: Upload prepared workspace
        uses: actions/upload-artifact@v4
        with:
          name: prepared-openwrt-workspace
          path: prepared-openwrt-workspace.tar
          if-no-files-found: error
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_dir: x86_64
            target: x86
            subtarget: 64
          - arch_dir: aarch64_cortex-a53
            target: mediatek
            subtarget: filogic

    env:
      ARCH_DIR: ${{ matrix.arch_dir }}

    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v4
        with:
          name: prepared-openwrt-workspace
          path: .

      - name: Extract prepared workspace
        run: |
          set -eux
          tar -xpf prepared-openwrt-workspace.tar

      - name: Configure OpenWrt (defconfig)
        run: |
          set -eux
          cd openwrt

          rm -f .config .config.old

          {
            echo "CONFIG_TARGET_${{ matrix.target }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y"
            echo ""
            for pkg in ${CUSTOM_PACKAGES}; do
              echo "CONFIG_PACKAGE_${pkg}=m"
            done
          } > .config

          make defconfig

      - name: Build packages (per arch)
        run: |
          set -eux
          cd openwrt

          make toolchain/install -j"$(nproc)" V=s

          for pkg in ${CUSTOM_PACKAGES}; do
            make "package/${pkg}/compile" -j"$(nproc)" V=s
          done

      - name: Stage repo output (per arch) + sign Packages
        env:
          USIGN_PRIVATE_KEY: ${{ secrets.USIGN_PRIVATE_KEY }}
          USIGN_PUBLIC_KEY: ${{ secrets.USIGN_PUBLIC_KEY }}
        run: |
          set -eux
          cd openwrt

          out="${GITHUB_WORKSPACE}/${PUBLISH_ROOT}/${CHANNEL}/packages/${ARCH_DIR}/${FEED_NAME}"
          mkdir -p "${out}"
          rm -f "${out}"/*.ipk "${out}/Packages" "${out}/Packages.gz" "${out}/Packages.sig"

          find_ipk() {
            local pkg="$1"
            (
              find bin/packages -type f -name "${pkg}_*.ipk" -print 2>/dev/null || true
              find bin/targets  -type f -name "${pkg}_*.ipk" -print 2>/dev/null || true
            ) | while read -r f; do
              stat -c '%Y %n' "$f" 2>/dev/null || true
            done | sort -nr | head -n1 | cut -d' ' -f2-
          }

          for pkg in ${CUSTOM_PACKAGES}; do
            echo "Collecting ${pkg} ipk..."
            ipk_path="$(find_ipk "${pkg}")"
            if [ -z "${ipk_path:-}" ]; then
              echo "ERROR: ${pkg} ipk not found under bin/packages or bin/targets"
              (find bin/packages -type f -name '*.ipk' -print || true) | head -n 400 || true
              exit 1
            fi
            echo "Using: ${ipk_path}"
            cp -av "${ipk_path}" "${out}/"
          done

          cd "${out}"

          "${GITHUB_WORKSPACE}/opkg-utils/opkg-make-index" . > Packages
          gzip -9c Packages > Packages.gz
          test -s Packages
          test -s Packages.gz

          umask 077
          echo "${USIGN_PRIVATE_KEY}" > usign_priv.key
          echo "${USIGN_PUBLIC_KEY}" > usign_pub.key
          chmod 600 usign_priv.key usign_pub.key

          USIGN_BIN="${GITHUB_WORKSPACE}/usign-src/build/usign"
          test -x "${USIGN_BIN}"

          "${USIGN_BIN}" -S -m Packages -s usign_priv.key -x Packages.sig
          test -s Packages.sig

          "${USIGN_BIN}" -V -m Packages -p usign_pub.key -x Packages.sig

          # ✅ 매우 중요 ✅ key 파일을 repo에 포함시키지 않도록 삭제함
          rm -f usign_priv.key usign_pub.key

      - name: Upload repo artifact (per arch)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PUBLISH_ROOT }}-${{ matrix.arch_dir }}-${{ env.CHANNEL }}
          path: ${{ env.PUBLISH_ROOT }}/${{ env.CHANNEL }}/packages/${{ matrix.arch_dir }}/${{ env.FEED_NAME }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout pages repo (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Download all repo artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.PUBLISH_ROOT }}-*-${{ env.CHANNEL }}
          path: ${{ env.PUBLISH_ROOT }}_tmp
          merge-multiple: false

      - name: Merge artifacts into public
        run: |
          set -eux
          rm -rf "${PUBLISH_ROOT}"
          mkdir -p "${PUBLISH_ROOT}/${CHANNEL}/packages"

          for d in "${PUBLISH_ROOT}_tmp"/*; do
            [ -d "$d" ] || continue
            base="$(basename "$d")"
            arch="${base#${PUBLISH_ROOT}-}"
            arch="${arch%-${CHANNEL}}"

            dest="${PUBLISH_ROOT}/${CHANNEL}/packages/${arch}/${FEED_NAME}"
            mkdir -p "${dest}"
            rsync -a --delete "$d/." "${dest}/"
          done

          find "${PUBLISH_ROOT}" -maxdepth 6 \( -name 'Packages.gz' -o -name 'Packages.sig' \) -print

      - name: Deploy to gh-pages (single push)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./${{ env.PUBLISH_ROOT }}
          keep_files: true
