name: Build & Publish custom opkg repo

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "stable or beta"
        required: true
        default: "stable"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_dir: x86_64
            target: x86
            subtarget: 64
          - arch_dir: aarch64_cortex-a53
            target: mediatek
            subtarget: filogic

    env:
      CHANNEL: ${{ inputs.channel }}
      ARCH_DIR: ${{ matrix.arch_dir }}

      PUBLISH_ROOT: public
      FEED_NAME: smartsafehub

      OPENWRT_REPO: Beomjun/openwrt
      OPENWRT_REF: production

      SRC_SAFESHIELD_REPO: Beomjun/safeshield
      SRC_SAFESHIELD_REF: main
      SRC_LUCI_REPO: Beomjun/luci-app-safeshield
      SRC_LUCI_REF: main

      CUSTOM_PACKAGES: safeshield luci-app-safeshield

      CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "6"
      CCACHE_SLOPPINESS: "time_macros,include_file_mtime,include_file_ctime"
      CCACHE_UMASK: "002"

    steps:
      - name: Checkout pages repo (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout OpenWrt (production branch)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENWRT_REPO }}
          ref: ${{ env.OPENWRT_REF }}
          path: openwrt
          fetch-depth: 1
          submodules: false

      - name: Checkout SafeShield source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SRC_SAFESHIELD_REPO }}
          ref: ${{ env.SRC_SAFESHIELD_REF }}
          path: src/safeshield
          fetch-depth: 1
          submodules: false

      - name: Checkout LuCI app source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SRC_LUCI_REPO }}
          ref: ${{ env.SRC_LUCI_REF }}
          path: src/luci-app-safeshield
          fetch-depth: 1
          submodules: false

      - name: Cache OpenWrt downloads (dl)
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ runner.os }}-${{ env.OPENWRT_REF }}
          restore-keys: |
            openwrt-dl-${{ runner.os }}-

      - name: Cache ccache (per arch)
        uses: actions/cache@v4
        with:
          path: openwrt/.ccache
          key: openwrt-ccache-${{ runner.os }}-${{ env.OPENWRT_REF }}-${{ matrix.arch_dir }}-
          restore-keys: |
            openwrt-ccache-${{ runner.os }}-${{ env.OPENWRT_REF }}-${{ matrix.arch_dir }}-
            openwrt-ccache-${{ runner.os }}-${{ env.OPENWRT_REF }}-
            openwrt-ccache-${{ runner.os }}-

      - name: Install build dependencies + ccache + opkg-utils deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gawk git gettext libncurses5-dev libssl-dev \
            python3 rsync unzip file wget curl ca-certificates zlib1g-dev \
            perl ccache cmake

      - name: Install opkg-utils without apt
        run: |
          set -eux
          rm -rf opkg-utils
          git clone --depth=1 https://git.yoctoproject.org/opkg-utils opkg-utils
          test -x opkg-utils/opkg-make-index || chmod +x opkg-utils/opkg-make-index
      
      - name: Build usign (host)
        run: |
          set -eux
          rm -rf usign-src
          git clone --depth=1 https://github.com/openwrt/usign.git usign-src
          mkdir -p usign-src/build
          cmake -S usign-src -B usign-src/build
          cmake --build usign-src/build -j"$(nproc)"
          test -x usign-src/build/usign

      - name: Prepare OpenWrt feeds and packages
        run: |
          set -eux
          cd openwrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          for pkg in ${CUSTOM_PACKAGES}; do
            rm -rf "package/${pkg}"
            rsync -a --delete "${GITHUB_WORKSPACE}/src/${pkg}/" "package/${pkg}/"
            test -f "package/${pkg}/Makefile"
          done

      - name: Configure OpenWrt (defconfig) + enable ccache
        run: |
          set -eux
          cd openwrt

          rm -f .config .config.old

          {
            echo "CONFIG_TARGET_${{ matrix.target }}=y"
            echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y"
            echo ""
            echo "CONFIG_CCACHE=y"
            echo "CONFIG_CCACHE_DIR=\"${CCACHE_DIR}\""
            echo ""
            for pkg in ${CUSTOM_PACKAGES}; do
              echo "CONFIG_PACKAGE_${pkg}=m"
            done
          } > .config

          make defconfig

      - name: Build packages (per arch) with ccache
        run: |
          set -eux
          cd openwrt

          mkdir -p "${CCACHE_DIR}"
          export CCACHE_DIR="${CCACHE_DIR}"
          export CCACHE_BASEDIR="${PWD}"
          export CCACHE_UMASK="${CCACHE_UMASK}"

          ccache --set-config=max_size="${CCACHE_MAXSIZE}" || true
          ccache --set-config=compress="${CCACHE_COMPRESS}" || true
          ccache --set-config=compress_level="${CCACHE_COMPRESSLEVEL}" || true
          ccache --set-config=sloppiness="${CCACHE_SLOPPINESS}" || true
          ccache -z || true

          echo "ccache (host) before:"
          ccache -s || true

          make toolchain/install -j"$(nproc)" V=s

          for pkg in ${CUSTOM_PACKAGES}; do
            make "package/${pkg}/compile" -j"$(nproc)" V=s
          done

          echo "ccache (host) after:"
          ccache -s || true

      - name: Stage repo output (per arch) + sign Packages (A안)
        env:
          USIGN_PRIVATE_KEY: ${{ secrets.USIGN_PRIVATE_KEY }}
          USIGN_PUBLIC_KEY: ${{ secrets.USIGN_PUBLIC_KEY }}
        run: |
          set -eux
          cd openwrt

          out="${GITHUB_WORKSPACE}/${PUBLISH_ROOT}/${CHANNEL}/packages/${ARCH_DIR}/${FEED_NAME}"
          mkdir -p "${out}"
          rm -f "${out}"/*.ipk "${out}/Packages" "${out}/Packages.gz" "${out}/Packages.sig"

          find_ipk() {
            local pkg="$1"
            ( find bin/packages -type f -name "${pkg}_*.ipk" -print 2>/dev/null || true
              find bin/targets  -type f -name "${pkg}_*.ipk" -print 2>/dev/null || true
            ) | while read -r f; do
              stat -c '%Y %n' "$f" 2>/dev/null || true
            done | sort -nr | head -n1 | cut -d' ' -f2-
          }

          for pkg in ${CUSTOM_PACKAGES}; do
            echo "Collecting ${pkg} ipk..."
            ipk_path="$(find_ipk "${pkg}")"
            if [ -z "${ipk_path:-}" ]; then
              echo "ERROR: ${pkg} ipk not found under bin/packages or bin/targets"
              (find bin/packages -type f -name '*.ipk' -print || true) | head -n 400 || true
              exit 1
            fi
            echo "Using: ${ipk_path}"
            cp -av "${ipk_path}" "${out}/"
          done

          cd "${out}"

          # Packages / Packages.gz 생성
          "${GITHUB_WORKSPACE}/opkg-utils/opkg-make-index" . > Packages
          gzip -9c Packages > Packages.gz
          test -s Packages
          test -s Packages.gz

          # usign private key 준비 (Secrets에서 파일로)
          umask 077
          echo "${USIGN_PRIVATE_KEY}" > usign_priv.key
          echo "${USIGN_PUBLIC_KEY}"  > usign_pub.key
          chmod 600 usign_priv.key usign_pub.key

          # Packages 서명 → Packages.sig 생성 (opkg가 이 파일을 받으려 함)
          USIGN_BIN="${GITHUB_WORKSPACE}/usign-src/build/usign"
          test -x "${USIGN_BIN}"

          "${USIGN_BIN}" -S -m Packages -s usign_priv.key -x Packages.sig
          test -s Packages.sig

          "${USIGN_BIN}" -V -m Packages -p usign_pub.key -x Packages.sig

          # ✅ 매우 중요 ✅ key 파일을 repo에 포함시키지 않도록 삭제함
          rm -f usign_priv.key usign_pub.key

      - name: Upload repo artifact (per arch)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PUBLISH_ROOT }}-${{ matrix.arch_dir }}-${{ inputs.channel }}
          path: ${{ env.PUBLISH_ROOT }}/${{ inputs.channel }}/packages/${{ matrix.arch_dir }}/${{ env.FEED_NAME }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build

    env:
      PUBLISH_ROOT: public
      CHANNEL: ${{ inputs.channel }}
      FEED_NAME: smartsafehub

    steps:
      - name: Checkout pages repo (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Download all repo artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.PUBLISH_ROOT }}-*-${{ inputs.channel }}
          path: ${{ env.PUBLISH_ROOT }}_tmp
          merge-multiple: false

      - name: Merge artifacts into public
        run: |
          set -eux
          rm -rf "${PUBLISH_ROOT}"
          mkdir -p "${PUBLISH_ROOT}/${CHANNEL}/packages"

          for d in "${PUBLISH_ROOT}_tmp"/*; do
            [ -d "$d" ] || continue
            base="$(basename "$d")"
            arch="${base#${PUBLISH_ROOT}-}"
            arch="${arch%-${CHANNEL}}"

            dest="${PUBLISH_ROOT}/${CHANNEL}/packages/${arch}/${FEED_NAME}"
            mkdir -p "${dest}"
            rsync -a --delete "$d/." "${dest}/"
          done

          find "${PUBLISH_ROOT}" -maxdepth 6 -name 'Packages.gz' -o -name 'Packages.sig' -print

      - name: Deploy to gh-pages (single push)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./${{ env.PUBLISH_ROOT }}
          keep_files: true
